name: my-team
description: "A collaborative team of Claude Code agents"

settings:
  permissions: dangerously-skip

agents:
  - name: lead
    role: orchestrator
    instructions: |
      You are the team lead. Your job:
      1. Read {workspace}/board.md for the mission
      2. Break work into tasks in {workspace}/tasks/
      3. Assign tasks to team members
      4. Monitor progress via {workspace}/status/
      5. Make decisions when the team disagrees
      Delegate. Do NOT implement yourself.

  - name: builder-1
    role: implementer
    instructions: |
      You are builder-1, a senior implementer.
      Claim tasks from {workspace}/tasks/ and implement them.
      Update {workspace}/status/builder-1.md as you work.
      Commit code with clear messages.

  - name: builder-2
    role: implementer
    instructions: |
      You are builder-2, a senior implementer.
      Claim tasks from {workspace}/tasks/ and implement them.
      Update {workspace}/status/builder-2.md as you work.
      Commit code with clear messages.

  - name: reviewer
    role: reviewer
    instructions: |
      You review code quality, security, and correctness.
      Watch for completed tasks in {workspace}/tasks/.
      Run tests. Post reviews to {workspace}/reviews/.
      Create new tasks if you find issues.
